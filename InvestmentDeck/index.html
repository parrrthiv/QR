<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover"/>
<title>CancerQR Investment Pitch</title>
<style>
:root{
  --navH:66px;
  --ink:#06183A;--muted:#5E6E86;--line:#DBE9F8;--blue:#126DF2;--sky:#2EB7FF;--teal:#17B8AE;--green:#22B56A;--violet:#7357FF;--orange:#FF7A1A;--red:#E7344F;--navy:#061B44;
  --grad:linear-gradient(135deg,#126DF2,#2EB7FF 55%,#17B8AE);
  --grad2:linear-gradient(135deg,#7357FF,#2EB7FF);
  --grad3:linear-gradient(135deg,#17B8AE,#22B56A);
  --grad4:linear-gradient(135deg,#FF7A1A,#FFB23B);
  --gradRed:linear-gradient(135deg,#D8203B,#FF7A1A);
  --shadow:0 16px 38px rgba(20,52,95,.12);
  --soft:0 9px 22px rgba(20,52,95,.08);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;width:100%;overflow:hidden;font-family:Inter,ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;color:var(--ink);background:

radial-gradient(430px 280px at -10% 14%,rgba(23,184,174,.14),transparent 62%),
linear-gradient(180deg,#FAFDFF,#EAF4FF)}
body.dark{background:
radial-gradient(600px 360px at 108% -5%,rgba(23,184,174,.18),transparent 60%),
radial-gradient(430px 280px at -10% 14%,rgba(46,183,255,.12),transparent 62%),
linear-gradient(180deg,#020B19,#061A33 55%,#082B38);color:#EFFBFF}
#deck{position:fixed;inset:0;overflow:hidden}
.stage{position:fixed;inset:0 0 calc(var(--navH) + env(safe-area-inset-bottom)) 0;padding:8px 10px;display:grid;place-items:center;overflow:hidden}
.slide{position:absolute;inset:8px 10px;display:none;align-items:center;justify-content:center}
.slide.active{display:flex;animation:enter .22s ease both}
@keyframes enter{from{opacity:0;transform:translateX(10px)}to{opacity:1;transform:none}}
.frame{width:min(100%,432px);height:100%;max-height:790px;border-radius:28px;background:linear-gradient(180deg,#fff,#fbfdff);border:1px solid rgba(173,207,240,.92);box-shadow:var(--shadow);overflow:hidden;position:relative}
.frame:before{content:"";position:absolute;inset:0;background:
radial-gradient(260px 150px at 106% 2%,rgba(46,183,255,.12),transparent 64%),
radial-gradient(210px 120px at -5% 100%,rgba(23,184,174,.08),transparent 64%),
linear-gradient(rgba(18,109,242,.032) 1px,transparent 1px),
linear-gradient(90deg,rgba(18,109,242,.032) 1px,transparent 1px);background-size:auto,auto,28px 28px,28px 28px;pointer-events:none}
body.dark .frame{background:linear-gradient(180deg,#06172D,#071D38 56%,#062B38);border-color:rgba(126,239,220,.22);box-shadow:0 16px 42px rgba(0,0,0,.38)}
body.dark .frame:before{background:
radial-gradient(260px 150px at 106% 2%,rgba(23,184,174,.14),transparent 64%),
radial-gradient(210px 120px at -5% 100%,rgba(46,183,255,.10),transparent 64%),
linear-gradient(rgba(126,239,220,.045) 1px,transparent 1px),
linear-gradient(90deg,rgba(126,239,220,.045) 1px,transparent 1px);background-size:auto,auto,28px 28px,28px 28px}
.inner{position:absolute;top:0;left:50%;width:100%;height:auto;min-height:100%;transform:translateX(-50%) scale(1);transform-origin:top center;padding:12px;display:grid;grid-template-rows:50px auto minmax(0,1fr) 108px 42px;gap:8px;z-index:1}
.top{border-radius:18px;background:linear-gradient(135deg,#F6FBFF,#EEFAFF 50%,#EDFFF8);border:1px solid var(--line);box-shadow:var(--soft);display:grid;grid-template-columns:38px minmax(0,1fr) auto auto;gap:8px;align-items:center;padding:7px 9px;overflow:hidden}
.logo{width:36px;height:36px;border-radius:12px;background:var(--grad);display:grid;place-items:center;color:#fff;font-weight:780;font-size:12px;box-shadow:0 8px 18px rgba(18,109,242,.18)}
.brand{font-size:24px;line-height:1;font-weight:780;letter-spacing:-.07em;color:var(--ink);text-decoration:none;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.brand span{color:var(--teal)}
.tool,.toggle{height:28px;border-radius:999px;border:0;display:flex;align-items:center;justify-content:center;gap:4px;padding:0 10px;font-size:9.5px;font-weight:780;text-decoration:none;white-space:nowrap;box-shadow:var(--soft)}
.tool{background:var(--grad2);color:#fff}.toggle{background:var(--grad3);color:#fff}
body.dark .top{background:linear-gradient(135deg,#041525,#072845 50%,#06443E);border-color:rgba(126,239,220,.2)}body.dark .brand{color:#F2FBFF}body.dark .brand span{color:#7DEADB}.dark .toggle{background:var(--grad2)}.dark .tool{background:linear-gradient(135deg,#7DEADB,#31D0BD);color:#06233C}
.head{display:grid;grid-template-rows:auto auto auto;gap:7px;padding:0 4px}.kicker{justify-self:start;height:28px;border-radius:999px;border:1px solid var(--line);background:linear-gradient(135deg,#F4FAFF,#F0FFFB);display:inline-flex;align-items:center;gap:7px;padding:0 12px;color:var(--blue);font-size:11px;font-weight:780;text-transform:uppercase;letter-spacing:.05em;box-shadow:var(--soft)}.kicker i{width:9px;height:9px;border-radius:50%;background:var(--grad)}
.title{font-size:clamp(26px,7.3vw,36px);line-height:.98;font-weight:780;letter-spacing:-.07em;text-wrap:balance}.accent{background:linear-gradient(90deg,var(--blue),var(--sky),var(--teal));-webkit-background-clip:text;background-clip:text;color:transparent}
.sub{font-size:14px;line-height:1.25;color:#33455E;font-weight:650;text-wrap:balance}.rule{width:140px;height:4px;border-radius:999px;background:var(--grad);margin-top:1px}
body.dark .kicker{background:rgba(255,255,255,.06);border-color:rgba(126,239,220,.15);color:#7DEADB}body.dark .sub{color:#B9CEE0}
.visual{border-radius:22px;background:linear-gradient(180deg,rgba(255,255,255,.96),rgba(248,252,255,.98));border:1px solid var(--line);box-shadow:var(--soft);overflow:hidden;padding:10px;display:grid;place-items:center;position:relative}
.visual:before{content:"";position:absolute;inset:0;background:radial-gradient(190px 110px at 85% 8%,rgba(115,87,255,.08),transparent 68%),radial-gradient(180px 100px at 8% 90%,rgba(23,184,174,.08),transparent 68%);pointer-events:none}
.visual>*{position:relative;z-index:1}.dark .visual{background:linear-gradient(180deg,rgba(8,31,56,.88),rgba(5,42,53,.86));border-color:rgba(126,239,220,.16)}
.cards{display:grid;grid-template-columns:1fr 1fr;gap:7px}.card{border-radius:16px;border:1px solid var(--line);background:#fff;box-shadow:var(--soft);display:grid;grid-template-columns:32px 1fr;gap:8px;align-items:center;min-height:48px;padding:8px;overflow:hidden}.card:nth-child(1){background:linear-gradient(135deg,#EFF7FF,#fff)}.card:nth-child(2){background:linear-gradient(135deg,#ECFFF8,#fff)}.card:nth-child(3){background:linear-gradient(135deg,#F4F0FF,#fff)}.card:nth-child(4){background:linear-gradient(135deg,#FFF4E8,#fff)}
.card i{font-style:normal;width:32px;height:32px;border-radius:12px;display:grid;place-items:center;color:#fff;background:var(--grad);font-size:16px;box-shadow:0 8px 18px rgba(18,109,242,.14)}.card:nth-child(2) i{background:var(--grad3)}.card:nth-child(3) i{background:var(--grad2)}.card:nth-child(4) i{background:var(--grad4)}
.card b{font-size:13.5px;line-height:1.02;font-weight:780;letter-spacing:-.035em;display:block}.card span{display:block;font-size:9px;line-height:1.1;color:var(--muted);font-weight:800;margin-top:2px}.dark .card{background:linear-gradient(135deg,rgba(255,255,255,.065),rgba(255,255,255,.035));border-color:rgba(126,239,220,.14)}.dark .card b{color:#F2FBFF}.dark .card span{color:#AAC3D6}
.links{border-radius:16px;background:linear-gradient(135deg,#F4FAFF,#ECFFF8);border:1px solid var(--line);box-shadow:var(--soft);display:grid;grid-template-columns:1fr 1fr;gap:8px;align-items:center;padding:6px}.links a{height:32px;border-radius:999px;text-decoration:none;color:#fff;font-size:10.5px;font-weight:780;display:flex;align-items:center;justify-content:center;gap:5px;white-space:nowrap;padding:0 10px}.links a:first-child{background:var(--grad)}.links a:last-child{background:var(--grad3)}.dark .links{background:rgba(255,255,255,.055);border-color:rgba(126,239,220,.14)}
.nav{position:fixed;left:0;right:0;bottom:0;height:calc(var(--navH) + env(safe-area-inset-bottom));z-index:20;padding:8px 12px calc(env(safe-area-inset-bottom) + 8px);background:linear-gradient(0deg,rgba(247,252,255,.98),rgba(247,252,255,.8),rgba(247,252,255,0));backdrop-filter:blur(10px)}.dark .nav{background:linear-gradient(0deg,rgba(2,11,25,.98),rgba(2,11,25,.78),rgba(2,11,25,0))}
.navin{max-width:432px;margin:auto;height:48px;display:grid;grid-template-columns:1fr auto 1fr;gap:8px;align-items:center}.btn{height:46px;border-radius:17px;border:1px solid var(--line);background:#fff;box-shadow:var(--soft);font-size:15px;font-weight:780;color:var(--ink)}.btn.primary{border:0;color:#fff;background:var(--grad)}.btn:disabled{opacity:.35}.count{height:36px;min-width:86px;border-radius:999px;background:#fff;border:1px solid var(--line);box-shadow:var(--soft);display:grid;place-items:center;font-size:11px;font-weight:780;color:var(--muted);letter-spacing:.08em;cursor:pointer}.dark .btn,.dark .count{background:#071D35;color:#EAF7FF;border-color:rgba(126,239,220,.15)}
.index{position:fixed;inset:0;background:rgba(5,18,38,.35);z-index:50;display:none;align-items:flex-end;backdrop-filter:blur(8px)}.index.open{display:flex}.sheet{width:100%;max-height:74vh;background:#fff;border-radius:28px 28px 0 0;padding:14px;overflow:auto}.sheet h3{font-size:22px;margin:0 4px 10px}.grab{width:44px;height:5px;border-radius:999px;background:#CAD8E6;margin:0 auto 14px}.idx{display:block;width:100%;text-align:left;border:1px solid var(--line);background:#fff;border-radius:16px;padding:11px 12px;margin:7px 0;font-size:14px;font-weight:780;color:var(--ink)}.idx.on{background:#EEF7FF;color:var(--blue)}.dark .sheet{background:#061832;color:#EAF7FF}.dark .idx{background:#071D35;border-color:rgba(126,239,220,.14);color:#EAF7FF}.dark .idx.on{background:#0A3148;color:#7DEADB}

/* Visual layouts */

.fno{width:30px;height:30px;border-radius:50%;display:grid;place-items:center;margin:-17px auto 0;background:var(--grad);color:#fff;font-weight:780}.fstep:nth-child(2) .fno{background:var(--grad3)}.fstep:nth-child(3) .fno{background:var(--grad2)}.fstep:nth-child(4) .fno{background:var(--grad4)}.fstep:nth-child(5) .fno{background:var(--grad)}.fico{font-size:34px}.fstep b{font-size:11.5px;line-height:1.04}.fstep span{font-size:8.1px;line-height:1.12;color:var(--muted);font-weight:800}
.news{width:100%;height:100%;display:grid;grid-template-columns:1fr 1fr;gap:9px;position:relative}.news:before{content:"⚠ Cancer burden alert";position:absolute;top:6px;left:50%;transform:translateX(-50%);z-index:4;background:var(--gradRed);color:#fff;height:26px;border-radius:999px;display:flex;align-items:center;padding:0 12px;font-size:10px;font-weight:780;box-shadow:0 10px 22px rgba(216,32,59,.22)}.shot{border-radius:18px;overflow:hidden;background:#fff;border:2px solid rgba(216,32,59,.45);box-shadow:0 12px 28px rgba(216,32,59,.13);position:relative}.shot:nth-child(2){border-color:rgba(255,122,26,.45);box-shadow:0 12px 28px rgba(255,122,26,.13)}.shot img{width:100%;height:100%;object-fit:cover;object-position:top center;display:block}.shot:after{content:"";position:absolute;inset:0;background:linear-gradient(180deg,transparent 42%,rgba(6,24,50,.90))}.ribbon{position:absolute;top:8px;left:8px;z-index:3;background:var(--gradRed);color:#fff;border-radius:999px;font-size:9px;font-weight:780;padding:6px 8px}.shot:nth-child(2) .ribbon{background:var(--grad4)}.ntxt{position:absolute;left:8px;right:8px;bottom:8px;z-index:3;color:#fff;background:rgba(6,24,50,.72);border:1px solid rgba(255,255,255,.15);backdrop-filter:blur(4px);border-radius:14px;padding:8px}.ntxt b{font-size:12px;line-height:1.05}.ntxt span{font-size:8.5px;line-height:1.1;color:#DCEEFF;display:block;margin-top:3px;font-weight:800}
.problemGrid,.miniGrid{width:100%;height:100%;display:grid;grid-template-columns:1fr 1fr;gap:9px}.pcard{border-radius:18px;border:1px solid var(--line);box-shadow:var(--soft);background:#fff;padding:10px;display:grid;align-content:start;gap:7px}.pcard:nth-child(1){background:linear-gradient(135deg,#FFF1F3,#fff)}.pcard:nth-child(2){background:linear-gradient(135deg,#ECFFF8,#fff)}.pcard:nth-child(3){background:linear-gradient(135deg,#F4F0FF,#fff)}.pcard:nth-child(4){background:linear-gradient(135deg,#FFF4E8,#fff)}.pcard i{font-style:normal;width:42px;height:42px;border-radius:14px;display:grid;place-items:center;color:#fff;background:var(--grad);font-size:22px}.pcard:nth-child(1) i{background:var(--gradRed)}.pcard:nth-child(2) i{background:var(--grad3)}.pcard:nth-child(3) i{background:var(--grad2)}.pcard:nth-child(4) i{background:var(--grad4)}.pcard b{font-size:14px;line-height:1.05}.pcard span{font-size:9px;line-height:1.15;color:var(--muted);font-weight:800}

.board{width:100%;height:100%;display:grid;grid-template-rows:1fr 50px;gap:8px}.room{position:relative;border-radius:20px;background:radial-gradient(circle at center,#EDF9FF 0 36%,#F8FCFF 37% 100%);border:1px solid var(--line);box-shadow:var(--soft);overflow:hidden}.center{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);width:112px;height:112px;border-radius:50%;background:linear-gradient(135deg,#061832,#126DF2);color:#fff;display:grid;place-items:center;text-align:center;font-size:15px;font-weight:780;box-shadow:var(--shadow)}.center span{display:block;font-size:8.5px;color:#CFE8FF}.expert{position:absolute;width:76px;height:58px;border-radius:18px;background:#fff;border:1px solid var(--line);box-shadow:var(--soft);display:grid;place-items:center;text-align:center;font-size:8.4px;font-weight:820}.expert i{font-style:normal;font-size:19px}.e1{left:50%;top:8px;transform:translateX(-50%)}.e2{right:12px;top:50px}.e3{right:12px;bottom:50px}.e4{left:50%;bottom:8px;transform:translateX(-50%)}.e5{left:12px;bottom:50px}.e6{left:12px;top:50px}.bar3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:7px}.bar3 div{border-radius:15px;color:#fff;font-size:10px;font-weight:780;display:grid;place-items:center;text-align:center;padding:5px}.bar3 div:nth-child(1){background:var(--grad)}.bar3 div:nth-child(2){background:var(--grad3)}.bar3 div:nth-child(3){background:var(--grad2)}
.cockpit{width:100%;height:100%;display:grid;grid-template-columns:1fr 1.05fr;gap:10px}.avatar{display:grid;grid-template-columns:46px 1fr;gap:8px;align-items:center}.av{width:46px;height:46px;border-radius:16px;background:linear-gradient(135deg,#EAF7FF,#ECFFF8);display:grid;place-items:center;font-size:26px;border:1px solid var(--line)}.ring{width:70px;height:70px;border-radius:50%;background:conic-gradient(var(--blue) 0 68%,#E8F2FF 68%);position:relative}.ring:after{content:"68%";position:absolute;inset:13px;background:#fff;border-radius:50%;display:grid;place-items:center;color:var(--blue);font-weight:780}.path{width:100%;height:100%;display:grid;grid-template-rows:1fr 50px;gap:9px}.list{display:grid;gap:7px}.jitem{display:grid;grid-template-columns:38px 28px 1fr;gap:8px;align-items:center;background:#fff;border:1px solid var(--line);border-radius:16px;box-shadow:var(--soft);padding:8px}.jitem i{font-style:normal;width:38px;height:38px;border-radius:14px;display:grid;place-items:center;color:#fff;background:var(--grad)}.jitem:nth-child(2) i{background:var(--grad3)}.jitem:nth-child(3) i{background:var(--grad2)}.jitem:nth-child(4) i{background:var(--grad4)}.num{width:26px;height:26px;border-radius:50%;background:#EEF7FF;display:grid;place-items:center;color:var(--blue);font-size:11px;font-weight:780}.jitem b{font-size:13px}.jitem span{font-size:8.6px;color:var(--muted);font-weight:800}.strip{border-radius:18px;border:1px solid var(--line);background:linear-gradient(135deg,#F4FAFF,#ECFFF8);display:grid;grid-template-columns:repeat(5,1fr);gap:5px;padding:6px}.strip div{text-align:center;font-size:8.2px;font-weight:820;color:var(--muted)}.strip i{font-style:normal;width:25px;height:25px;border-radius:50%;display:grid;place-items:center;margin:auto auto 3px;background:#fff;box-shadow:var(--soft)}
.table{width:100%;height:100%;display:grid;grid-template-rows:repeat(5,1fr);gap:6px}.trow{display:grid;grid-template-columns:1.3fr .7fr .7fr .7fr;gap:6px}.cell{border-radius:12px;background:#fff;border:1px solid var(--line);box-shadow:var(--soft);display:grid;place-items:center;text-align:center;font-size:9px;font-weight:820;padding:5px}.trow:first-child .cell{background:linear-gradient(135deg,#EEF7FF,#fff);color:var(--blue)}.yes{color:var(--green);font-size:16px}.no{color:#9CADBD}.some{color:var(--orange)}
.askHero{width:100%;height:100%;display:grid;grid-template-rows:105px 1fr;gap:9px}.money{border-radius:20px;background:linear-gradient(135deg,#061832,#126DF2,#17B8AE);color:#fff;display:grid;grid-template-columns:1fr 1fr;gap:2px;align-items:center;text-align:center;box-shadow:var(--shadow)}.money div:first-child{border-right:1px solid rgba(255,255,255,.25)}.money b{display:block;font-size:34px;line-height:1;font-weight:780}.money span{font-size:11px;font-weight:780;color:#DFF5FF}.donut{display:grid;grid-template-columns:100px 1fr;gap:10px;align-items:center}.don{width:92px;height:92px;border-radius:50%;background:conic-gradient(var(--blue) 0 40%,var(--teal) 40% 65%,var(--violet) 65% 85%,var(--orange) 85% 100%);position:relative}.don:after{content:"Use";position:absolute;inset:20px;border-radius:50%;background:#fff;display:grid;place-items:center;font-weight:780;color:var(--blue)}.legend{display:grid;gap:5px}.legend div{font-size:10px;font-weight:780;color:var(--muted)}.legend i{display:inline-block;width:9px;height:9px;border-radius:50%;margin-right:5px}

stage.innerHTML = frames.map((f,i)=>`<section class="slide ${sectionClass(i)} ${i===0?'active':''}" data-title="${f.k}"><div class="frame"><div class="inner"><div class="top cleanTop"><div class="logo">QR</div><a class="brand" href="https://cancerqr.com/" target="_blank">Cancer<span>QR</span></a><button class="toggle" type="button">🌙 Dark</button></div><div class="head"><div class="kicker"><i></i>${f.k}</div><h1 class="title">${aTitle(f.title,f.accent)}</h1><div class="rule"></div><p class="sub">${f.sub}</p></div><div class="visual">${visual(f.kind)}</div><div class="cards">${renderCards(f.cards)}</div><div class="frameFooter">${f.footer}</div></div></div></section>`).join('');
const slides=[...document.querySelectorAll('.slide')],count=document.getElementById('count'),prev=document.getElementById('prev'),next=document.getElementById('next'),idx=document.getElementById('idx'),list=document.getElementById('idxList');
let n=0;
function fitFrame(frame){const inner=frame.querySelector('.inner');inner.style.transform='translateX(-50%) scale(1)';let scale=Math.min(1,frame.clientHeight/inner.scrollHeight,frame.clientWidth/inner.scrollWidth);if(!isFinite(scale)||scale<=0)scale=1;if(scale<1)scale=Math.max(.86,scale-.006);inner.style.transform=`translateX(-50%) scale(${scale})`;}
function fitAll(){document.querySelectorAll('.frame').forEach(fitFrame)}
function buildIndex(){list.innerHTML='';frames.forEach((f,i)=>{const b=document.createElement('button');b.className='idx'+(i===n?' on':'');b.textContent=String(i+1).padStart(2,'0')+' — '+f.k.split('•').pop().trim();b.onclick=()=>{n=i;show();idx.classList.remove('open')};list.appendChild(b)})}
function show(){slides.forEach((s,i)=>s.classList.toggle('active',i===n));count.textContent=String(n+1).padStart(2,'0')+' / 25';prev.disabled=n===0;next.textContent=n===24?'Restart':'Next →';buildIndex();requestAnimationFrame(()=>fitFrame(slides[n].querySelector('.frame')))}
prev.onclick=()=>{if(n>0){n--;show()}};next.onclick=()=>{n=n===24?0:n+1;show()};count.onclick=()=>idx.classList.add('open');idx.onclick=e=>{if(e.target===idx)idx.classList.remove('open')};
document.addEventListener('click',e=>{if(e.target.classList.contains('toggle')){document.body.classList.toggle('dark');document.querySelectorAll('.toggle').forEach(b=>b.textContent=document.body.classList.contains('dark')?'☀️ Light':'🌙 Dark');setTimeout(fitAll,50)}});
window.addEventListener('resize',fitAll);window.addEventListener('keydown',e=>{if(e.key==='ArrowRight'&&n<24){n++;show()}if(e.key==='ArrowLeft'&&n>0){n--;show()}if(e.key==='Escape')idx.classList.remove('open')});
let sx=0,sy=0,lock=false;document.addEventListener('touchstart',e=>{const t=e.changedTouches[0];sx=t.clientX;sy=t.clientY;lock=false},{passive:true});document.addEventListener('touchmove',e=>{if(lock)return;const t=e.changedTouches[0],dx=t.clientX-sx,dy=t.clientY-sy;if(Math.abs(dx)>Math.abs(dy)+35){lock=true;if(dx<-45&&n<24){n++;show()}if(dx>45&&n>0){n--;show()}}},{passive:true});
show();setTimeout(fitAll,150);
</script>

<script id="v18-allpurpose-controls">
(function(){
  let startX=0,startY=0;
  document.addEventListener('touchstart',function(e){
    if(!e.touches || !e.touches[0]) return;
    startX=e.touches[0].clientX; startY=e.touches[0].clientY;
  },{passive:true});
  document.addEventListener('touchend',function(e){
    if(!e.changedTouches || !e.changedTouches[0]) return;
    const dx=e.changedTouches[0].clientX-startX;
    const dy=e.changedTouches[0].clientY-startY;
    if(Math.abs(dx)>45 && Math.abs(dx)>Math.abs(dy)*1.25){
      const nextBtn=document.getElementById('next');
      const prevBtn=document.getElementById('prev');
      if(dx<0 && nextBtn) nextBtn.click();
      if(dx>0 && prevBtn) prevBtn.click();
    }
  },{passive:true});
  document.addEventListener('keydown',function(e){
    const nextBtn=document.getElementById('next');
    const prevBtn=document.getElementById('prev');
    if(e.key==='ArrowRight' || e.key===' ' || e.key==='PageDown'){ if(nextBtn) nextBtn.click(); }
    if(e.key==='ArrowLeft' || e.key==='PageUp'){ if(prevBtn) prevBtn.click(); }
  });
})();
</script>
